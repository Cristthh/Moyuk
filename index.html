<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Financiero Moyuk</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/2.30.0/date-fns.min.js"></script>

  <style>
    @media print { .no-print { display: none !important; } }
    body { background-color: #F5F5F5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect } = React;
    const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, BarChart, Bar, Legend } = Recharts;
    const { parse, isValid, format, subMonths } = dateFns;

    const COLORS = ['#0088FE','#00C49F','#FFBB28','#FF8042','#8884d8','#82ca9d','#ffc658','#a4de6c','#d0ed57'];
    const CSV_URL = "https://raw.githubusercontent.com/Cristthh/Moyuk/main/CONSOLIDADO_MOYUK_LIMPIO.csv";

    const formatCurrency = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v || 0);
    const formatPercent = (v) => new Intl.NumberFormat('es-MX', { style: 'percent', minimumFractionDigits: 1 }).format(v || 0);

    const parseDate = (s) => {
      if(!s) return new Date(0);
      const d = parse(s, 'dd/MM/yyyy', new Date());
      return isValid(d) ? d : new Date(0);
    };

    function KPICard({ title, value, iconClass, iconColor }) {
      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
          <div className="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center mb-4">
            <i className={`fa-solid ${iconClass} ${iconColor} text-lg`}></i>
          </div>
          <p className="text-sm font-medium text-gray-500">{title}</p>
          <h3 className="text-2xl font-bold">{value}</h3>
        </div>
      );
    }

    function Dashboard() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        Papa.parse(CSV_URL, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: (results) => {
            setData(results.data);
            setLoading(false);
          },
          error: () => setLoading(false)
        });
      }, []);

      const processed = useMemo(() => {
        if (data.length === 0) return null;
        
        let sales = 0, expenses = 0;
        const catMap = {};
        const monthMap = {};

        data.forEach(t => {
          const amt = Number(t.IMPORTE) || 0;
          const isIngreso = t.TRANSACCION === 'Ingreso';
          const date = parseDate(t.FECHA);
          const mKey = isValid(date) && date.getTime() !== 0 ? format(date, 'MMM yy') : 'S/F';

          if (isIngreso) {
            sales += amt;
          } else {
            expenses += amt;
            catMap[t.CATEGORIA] = (catMap[t.CATEGORIA] || 0) + amt;
          }

          if(!monthMap[mKey]) monthMap[mKey] = { name: mKey, sales: 0, expenses: 0 };
          if(isIngreso) monthMap[mKey].sales += amt;
          else monthMap[mKey].expenses += amt;
        });

        return {
          totalSales: sales,
          totalExpenses: expenses,
          margin: sales > 0 ? (sales - expenses) / sales : 0,
          monthly: Object.values(monthMap),
          categories: Object.entries(catMap).map(([name, value]) => ({ name, value }))
        };
      }, [data]);

      if (loading) return <div className="h-screen flex items-center justify-center font-sans">Cargando datos maestros...</div>;

      const { totalSales, totalExpenses, margin, monthly, categories } = processed || {};

      return (
        <div className="p-4 md:p-8 max-w-7xl mx-auto font-sans">
          <header className="mb-8">
            <h1 className="text-3xl font-bold text-gray-900">Análisis Consolidado Moyuk</h1>
            <p className="text-gray-500 text-sm">Visualización en tiempo real desde GitHub CSV</p>
          </header>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <KPICard title="Ingresos Totales" value={formatCurrency(totalSales)} iconClass="fa-sack-dollar" iconColor="text-emerald-500" />
            <KPICard title="Egresos Totales" value={formatCurrency(totalExpenses)} iconClass="fa-money-bill-transfer" iconColor="text-rose-500" />
            <KPICard title="Margen Neto" value={formatPercent(margin)} iconClass="fa-chart-pie" iconColor="text-blue-500" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
              <h2 className="text-lg font-bold mb-6 text-gray-700">Flujo de Caja Mensual</h2>
              <div className="h-72">
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={monthly}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                    <XAxis dataKey="name" />
                    <YAxis tickFormatter={(v) => `$${v/1000}k`} />
                    <Tooltip formatter={(v) => formatCurrency(v)} />
                    <Area type="monotone" dataKey="sales" stroke="#10b981" fill="#10b98122" />
                    <Area type="monotone" dataKey="expenses" stroke="#ef4444" fill="#ef444422" />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
              <h2 className="text-lg font-bold mb-6 text-gray-700">Gastos por Categoría</h2>
              <div className="h-72">
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Pie data={categories} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={60} outerRadius={90}>
                      {categories?.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                    </Pie>
                    <Tooltip formatter={(v) => formatCurrency(v)} />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
