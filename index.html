<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Financiero</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PapaParse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- Recharts -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <!-- date-fns -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/date-fns/2.30.0/date-fns.min.js"></script>

  <!-- jsPDF para exportar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <style>
    /* CAMBIO 7: Ocultar elementos con .no-print al usar Ctrl+P */
    @media print {
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="bg-[#F5F5F5] text-gray-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            PieChart, Pie, Cell, BarChart, Bar } = Recharts;
    const { parse, isValid, format, subMonths } = dateFns;

    const COLORS = ['#0088FE','#00C49F','#FFBB28','#FF8042','#8884d8','#82ca9d','#ffc658','#a4de6c','#d0ed57'];

    // ═══════════════════════════════════════════════════════════════════════════
    // CAMBIO 1: URL del CSV
    // Cuando subas a GitHub, pon aquí la URL raw de tu CSV.
    // Ejemplo: https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/CONSOLIDADO_MOYUK_LIMPIO.csv
    // Por ahora apunta al mismo nombre de archivo (funciona si están en la misma carpeta).
    const CSV_URL = "https://raw.githubusercontent.com/Cristthh/Moyuk/main/CONSOLIDADO_MOYUK_LIMPIO.csv";
    // ═══════════════════════════════════════════════════════════════════════════

    const formatCurrency = (v) =>
      new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v);
    const formatPercent = (v) =>
      new Intl.NumberFormat('es-MX', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(v);
    const cn = (...c) => c.filter(Boolean).join(' ');

    const parseDate = (s) => {
      const d = parse(s, 'dd/MM/yyyy', new Date());
      return isValid(d) ? d : new Date(0);
    };

    // ─── CAMBIO 5: Agrupación mensual ────────────────────────────────────────
    function buildMonthlyData(transactions) {
      const monthly = {};
      const bizMonthly = {};

      transactions.forEach((t) => {
        const amount = Number(t.IMPORTE) || 0;
        const isIngreso = t.TRANSACCION === 'Ingreso';
        const d = parseDate(t.FECHA);
        if (d.getTime() === 0) return;

        const key = format(d, 'MMM yyyy');
        const sort = format(d, 'yyyy-MM');
        const biz = t.NEGOCIO || 'Otros';

        if (!monthly[key]) monthly[key] = { sales: 0, expenses: 0, sort };
        if (isIngreso) monthly[key].sales += amount;
        else monthly[key].expenses += amount;

        const bk = `${biz}||${key}`;
        if (!bizMonthly[bk]) bizMonthly[bk] = { biz, key, sort, sales: 0, expenses: 0 };
        if (isIngreso) bizMonthly[bk].sales += amount;
        else bizMonthly[bk].expenses += amount;
      });

      const monthlyChart = Object.entries(monthly)
        .sort((a, b) => a[1].sort.localeCompare(b[1].sort))
        .map(([name, d]) => ({ name, sales: d.sales, expenses: d.expenses, profit: d.sales - d.expenses }));

      return { monthlyChart, bizMonthly };
    }
    // ─────────────────────────────────────────────────────────────────────────

    function processTransactions(transactions) {
      let totalSales = 0, totalExpenses = 0, operatingExpenses = 0, costOfSales = 0;
      const bizData = {};
      const catData = {};

      transactions.forEach((t) => {
        const amount = Number(t.IMPORTE) || 0;
        const isIngreso = t.TRANSACCION === 'Ingreso';
        const biz = t.NEGOCIO || 'Otros';
        const cat = t.CATEGORIA || 'Sin Categoría';
        const type = t.ESTADO_DE_RESULTADOS;

        if (isIngreso) { totalSales += amount; }
        else {
          totalExpenses += amount;
          if (type === 'Gasto Operativo') operatingExpenses += amount;
          if (type === 'Costo de Venta') costOfSales += amount;
          catData[cat] = (catData[cat] || 0) + amount;
        }
        if (!bizData[biz]) bizData[biz] = { sales: 0, expenses: 0 };
        if (isIngreso) bizData[biz].sales += amount;
        else bizData[biz].expenses += amount;
      });

      const netProfit = totalSales - totalExpenses;
      const margin = totalSales > 0 ? netProfit / totalSales : 0;

      const { monthlyChart, bizMonthly } = buildMonthlyData(transactions);

      const businessBreakdown = Object.entries(bizData)
        .map(([name, d]) => ({ name, sales: d.sales, expenses: d.expenses }));

      const categoryBreakdown = Object.entries(catData)
        .map(([name, value]) => ({ name, value }))
        .sort((a, b) => b.value - a.value);

      // CAMBIO 9: tabla de negocios x mes
      const allBusinesses = [...new Set(Object.values(bizMonthly).map(d => d.biz))].sort();
      const allMonths = [...new Set(Object.values(bizMonthly).map(d => d.key))]
        .sort((a, b) => {
          const as = Object.values(bizMonthly).find(d => d.key === a)?.sort || '';
          const bs = Object.values(bizMonthly).find(d => d.key === b)?.sort || '';
          return as.localeCompare(bs);
        });

      const businessByMonth = allMonths.map(month => {
        const row = { month };
        allBusinesses.forEach(biz => {
          const e = bizMonthly[`${biz}||${month}`];
          row[`${biz}_sales`]    = e ? e.sales : 0;
          row[`${biz}_expenses`] = e ? e.expenses : 0;
          row[`${biz}_profit`]   = e ? (e.sales - e.expenses) : 0;
        });
        return row;
      });

      return {
        stats: { totalSales, totalExpenses, netProfit, operatingExpenses, costOfSales, margin },
        monthlyChart, businessBreakdown, categoryBreakdown, businessByMonth, allBusinesses,
      };
    }

    // ─── CAMBIO 7: Exportar a PDF ─────────────────────────────────────────────
    function exportToPDF(filteredData) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

      doc.setFontSize(16);
      doc.setTextColor(30, 30, 30);
      doc.text('Reporte de Transacciones', 14, 15);
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text(`Generado: ${new Date().toLocaleDateString('es-MX')}  |  Registros: ${filteredData.length}`, 14, 22);

      doc.autoTable({
        startY: 27,
        head: [['Fecha','Estado','Transacción','Negocio','Proveedor','Categoría','Descripción','Importe']],
        body: filteredData.map(t => [
          t.FECHA || '',
          t.ESTADO_DE_RESULTADOS || '',
          t.TRANSACCION || '',
          t.NEGOCIO || '',
          t.PROVEEDOR || '-',
          t.CATEGORIA || '',
          t.DESCRIPCION || '-',
          `${t.TRANSACCION === 'Ingreso' ? '+' : '-'}${formatCurrency(Number(t.IMPORTE))}`,
        ]),
        styles: { fontSize: 7, cellPadding: 2 },
        headStyles: { fillColor: [59,130,246], textColor: 255, fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [248,250,252] },
        columnStyles: { 7: { halign: 'right' } },
      });

      doc.save('transacciones.pdf');
    }
    // ─────────────────────────────────────────────────────────────────────────

    function KPICard({ title, value, iconClass, iconColor, trend, positive, label }) {
      return (
        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-between">
          <div className="flex items-center justify-between mb-4">
            <div className="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center">
              <i className={`fa-solid ${iconClass} ${iconColor} text-lg`}></i>
            </div>
            {trend && (
              <div className={cn("flex items-center gap-1 text-xs font-bold px-2 py-1 rounded-lg",
                positive ? "bg-emerald-50 text-emerald-700" : "bg-rose-50 text-rose-700")}>
                <i className={`fa-solid ${positive ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}`}></i>
                {trend}
              </div>
            )}
          </div>
          <div>
            <p className="text-sm font-medium text-gray-500 mb-1">{title}</p>
            <h3 className="text-2xl font-bold tracking-tight truncate">{value}</h3>
            {label && <p className="text-xs text-gray-400 mt-2">{label}</p>}
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [data, setData]             = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [autoLoading, setAutoLoading] = useState(true);
      const [autoError, setAutoError]   = useState(false);
      const [lastUpdated, setLastUpdated] = useState(null);   // CAMBIO 2
      const [selectedBizMonth, setSelectedBizMonth] = useState(null); // CAMBIO 9
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 100;

      const [filters, setFilters] = useState({
        ESTADO_DE_RESULTADOS:'', TRANSACCION:'', NEGOCIO:'',
        PROVEEDOR:'', CATEGORIA:'', startDate:'', endDate:'',
      });

      useEffect(() => { setCurrentPage(1); }, [filters]);

      // CAMBIO 1: carga automática
      useEffect(() => {
        fetch(CSV_URL)
          .then(res => {
            if (!res.ok) throw new Error('fetch failed');
            const lm = res.headers.get('last-modified');
            if (lm) setLastUpdated(new Date(lm));
            return res.text();
          })
          .then(text => {
            Papa.parse(text, {
              header: true, skipEmptyLines: true,
              complete: (r) => {
                setData(r.data);
                setAutoLoading(false);
                setLastUpdated(prev => prev || new Date());
              },
            });
          })
          .catch(() => { setAutoLoading(false); setAutoError(true); });
      }, []);

      const sortedData = useMemo(() =>
        [...data].sort((a,b) => parseDate(b.FECHA).getTime() - parseDate(a.FECHA).getTime()),
      [data]);

      const maxDataDate = useMemo(() => {
        for (const t of sortedData) {
          const d = parseDate(t.FECHA);
          if (d.getTime() > 0) return d;
        }
        return new Date();
      }, [sortedData]);

      const filteredData = useMemo(() => {
        const start = filters.startDate ? parse(filters.startDate,'yyyy-MM-dd',new Date()) : null;
        if (start) start.setHours(0,0,0,0);
        const end = filters.endDate ? parse(filters.endDate,'yyyy-MM-dd',new Date()) : null;
        if (end) end.setHours(23,59,59,999);

        return sortedData.filter(t => {
          const td = parseDate(t.FECHA);
          return (
            (!filters.ESTADO_DE_RESULTADOS || t.ESTADO_DE_RESULTADOS === filters.ESTADO_DE_RESULTADOS) &&
            (!filters.TRANSACCION || t.TRANSACCION === filters.TRANSACCION) &&
            (!filters.NEGOCIO || t.NEGOCIO === filters.NEGOCIO) &&
            (!filters.PROVEEDOR || t.PROVEEDOR === filters.PROVEEDOR) &&
            (!filters.CATEGORIA || t.CATEGORIA === filters.CATEGORIA) &&
            (!start || td >= start) && (!end || td <= end)
          );
        });
      }, [sortedData, filters]);

      const totalPages   = Math.ceil(filteredData.length / itemsPerPage);
      const paginatedData = useMemo(() => {
        const s = (currentPage - 1) * itemsPerPage;
        return filteredData.slice(s, s + itemsPerPage);
      }, [filteredData, currentPage]);

      const uniqueValues = useMemo(() => {
        const v = { ESTADO_DE_RESULTADOS:new Set(), TRANSACCION:new Set(), NEGOCIO:new Set(), PROVEEDOR:new Set(), CATEGORIA:new Set() };
        data.forEach(t => {
          if (t.ESTADO_DE_RESULTADOS) v.ESTADO_DE_RESULTADOS.add(t.ESTADO_DE_RESULTADOS);
          if (t.TRANSACCION)          v.TRANSACCION.add(t.TRANSACCION);
          if (t.NEGOCIO)              v.NEGOCIO.add(t.NEGOCIO);
          if (t.PROVEEDOR)            v.PROVEEDOR.add(t.PROVEEDOR);
          if (t.CATEGORIA)            v.CATEGORIA.add(t.CATEGORIA);
        });
        return Object.fromEntries(Object.entries(v).map(([k,s]) => [k, Array.from(s).sort()]));
      }, [data]);

      const processed = useMemo(() =>
        filteredData.length > 0 ? processTransactions(filteredData) : null,
      [filteredData]);

      const parseFile = (file) => {
        Papa.parse(file, {
          header: true, skipEmptyLines: true,
          complete: (r) => { setData(r.data); setLastUpdated(new Date()); },
        });
      };

      const handleFileUpload = (e) => { const f = e.target.files?.[0]; if (f) parseFile(f); };
      const onDragOver  = (e) => { e.preventDefault(); setIsDragging(true); };
      const onDragLeave = () => setIsDragging(false);
      const onDrop = (e) => {
        e.preventDefault(); setIsDragging(false);
        const f = e.dataTransfer.files?.[0];
        if (f && f.type === 'text/csv') parseFile(f);
      };

      const handleFilterChange = (k, v) => setFilters(p => ({ ...p, [k]: v }));
      const handleQuickDate = (months) => {
        if (months === null) {
          setFilters(p => ({ ...p, startDate:'', endDate:'' }));
        } else {
          const end = maxDataDate;
          const start = subMonths(end, months);
          setFilters(p => ({ ...p, startDate: format(start,'yyyy-MM-dd'), endDate: format(end,'yyyy-MM-dd') }));
        }
      };
      const clearFilters = () => setFilters({ ESTADO_DE_RESULTADOS:'', TRANSACCION:'', NEGOCIO:'', PROVEEDOR:'', CATEGORIA:'', startDate:'', endDate:'' });

      // ── Pantalla carga ────────────────────────────────────────────────────────
      if (autoLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-gray-500 font-medium">Cargando datos financieros...</p>
            </div>
          </div>
        );
      }

      // ── Pantalla upload ───────────────────────────────────────────────────────
      if (data.length === 0) {
        return (
          <div className="min-h-screen flex items-center justify-center p-6">
            <div onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
              className={cn("max-w-xl w-full p-12 border-2 border-dashed rounded-3xl transition-all duration-200 flex flex-col items-center text-center",
                isDragging ? "border-blue-500 bg-blue-50 scale-105" : "border-gray-300 bg-white")}>
              <div className="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mb-6">
                <i className="fa-solid fa-cloud-arrow-up text-3xl text-blue-600"></i>
              </div>
              <h1 className="text-3xl font-bold text-gray-900 mb-2">Dashboard Financiero</h1>
              {autoError && (
                <p className="text-amber-600 text-sm mb-4 bg-amber-50 px-4 py-2 rounded-xl">
                  <i className="fa-solid fa-triangle-exclamation mr-2"></i>
                  No se pudo cargar el CSV automáticamente. Carga el archivo manualmente.
                </p>
              )}
              <p className="text-gray-500 mb-8 text-lg">Arrastra tu .csv o haz clic para seleccionarlo.</p>
              <label className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold cursor-pointer transition-colors shadow-lg shadow-blue-200">
                Seleccionar Archivo
                <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
              </label>
            </div>
          </div>
        );
      }

      const { stats, monthlyChart, businessBreakdown, categoryBreakdown, businessByMonth, allBusinesses } =
        processed || { stats:{totalSales:0,totalExpenses:0,netProfit:0,operatingExpenses:0,costOfSales:0,margin:0},
          monthlyChart:[], businessBreakdown:[], categoryBreakdown:[], businessByMonth:[], allBusinesses:[] };

      const totalIngresos = filteredData.filter(t => t.TRANSACCION==='Ingreso').reduce((s,t) => s+(Number(t.IMPORTE)||0),0);
      const totalEgresos  = filteredData.filter(t => t.TRANSACCION!=='Ingreso').reduce((s,t) => s+(Number(t.IMPORTE)||0),0);
      const bizMonthDisplay = selectedBizMonth ? businessByMonth.filter(r => r.month === selectedBizMonth) : businessByMonth;

      return (
        <div className="p-4 md:p-8">

          {/* HEADER */}
          <header className="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <h1 className="text-3xl font-bold tracking-tight">Análisis Financiero</h1>
              {/* CAMBIO 2: Última actualización */}
              <p className="text-gray-500 flex items-center gap-2 flex-wrap">
                Resumen de ingresos y egresos consolidados
                {lastUpdated && (
                  <span className="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-lg font-medium">
                    <i className="fa-solid fa-clock mr-1"></i>
                    Actualizado: {lastUpdated.toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' })}
                  </span>
                )}
              </p>
            </div>
            <div className="flex items-center gap-3 no-print">
              <label className="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm font-medium hover:bg-gray-50 flex items-center gap-2 cursor-pointer">
                <i className="fa-solid fa-upload"></i> Cargar CSV
                <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
              </label>
              {monthlyChart.length > 0 && (
                <div className="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-medium flex items-center gap-2 shadow-sm">
                  <i className="fa-solid fa-calendar-days"></i>
                  {monthlyChart[0]?.name} – {monthlyChart[monthlyChart.length-1]?.name}
                </div>
              )}
            </div>
          </header>

          <main className="max-w-7xl mx-auto space-y-6">

            {/* FILTROS */}
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-4 no-print">
              <div className="flex flex-wrap items-center gap-3 pb-4 border-b border-gray-100">
                <span className="text-sm text-gray-500 font-medium flex items-center gap-2">
                  <i className="fa-solid fa-calendar"></i> Rango:
                </span>
                {[[1,'Último Mes'],[3,'3 Meses'],[6,'6 Meses'],[null,'Todo']].map(([m,l]) => (
                  <button key={l} onClick={() => handleQuickDate(m)}
                    className="px-4 py-1.5 text-sm font-medium bg-white border border-gray-200 rounded-lg hover:bg-blue-50 hover:text-blue-600">
                    {l}
                  </button>
                ))}
                <div className="h-6 w-px bg-gray-200 mx-2 hidden sm:block"></div>
                <div className="flex items-center gap-2">
                  <span className="text-sm text-gray-400">Desde:</span>
                  <input type="date" className="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg p-1.5"
                    value={filters.startDate} onChange={e => handleFilterChange('startDate', e.target.value)} />
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-sm text-gray-400">Hasta:</span>
                  <input type="date" className="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg p-1.5"
                    value={filters.endDate} onChange={e => handleFilterChange('endDate', e.target.value)} />
                </div>
              </div>
              <div className="flex flex-wrap items-center gap-4">
                <div className="flex items-center gap-2 text-gray-500 font-medium mr-2">
                  <i className="fa-solid fa-filter"></i> Filtros:
                </div>
                {[
                  {k:'ESTADO_DE_RESULTADOS', l:'Estado (Todos)'},
                  {k:'TRANSACCION',          l:'Transacción (Todas)'},
                  {k:'NEGOCIO',              l:'Negocio (Todos)'},
                  {k:'PROVEEDOR',            l:'Proveedor (Todos)'},
                  {k:'CATEGORIA',            l:'Categoría (Todas)'},
                ].map(({k,l}) => (
                  <select key={k} className="bg-gray-50 border border-gray-200 text-sm rounded-xl p-2.5"
                    value={filters[k]} onChange={e => handleFilterChange(k, e.target.value)}>
                    <option value="">{l}</option>
                    {uniqueValues[k].map(v => <option key={v} value={v}>{v||'Sin valor'}</option>)}
                  </select>
                ))}
                {Object.values(filters).some(v => v !== '') && (
                  <button onClick={clearFilters} className="text-sm text-rose-600 font-medium hover:text-rose-700 px-2">
                    Limpiar Filtros
                  </button>
                )}
              </div>
            </div>

            {/* KPI CARDS */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <KPICard title="Ventas Totales"     value={formatCurrency(stats.totalSales)}      iconClass="fa-arrow-trend-up"   iconColor="text-emerald-600" positive={true} />
              <KPICard title="Gastos Totales"     value={formatCurrency(stats.totalExpenses)}   iconClass="fa-arrow-trend-down" iconColor="text-rose-600"    positive={false} />
              <KPICard title="Utilidad Neta"      value={formatCurrency(stats.netProfit)}       iconClass="fa-dollar-sign"      iconColor="text-blue-600"    trend={formatPercent(stats.margin)} label="Margen Neto" positive={stats.netProfit>=0} />
              <KPICard title="Gastos Operativos"  value={formatCurrency(stats.operatingExpenses)} iconClass="fa-percent"        iconColor="text-amber-600"   label={stats.totalExpenses>0?`${formatPercent(stats.operatingExpenses/stats.totalExpenses)} del gasto total`:'0% del gasto total'} />
            </div>

            {/* CAMBIO 5: Gráfica mensual + CAMBIO 3: Pie con lista completa */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-lg font-bold flex items-center gap-2">
                    <i className="fa-solid fa-chart-line text-blue-600"></i> Tendencia Mensual
                  </h2>
                  <div className="flex items-center gap-4 text-xs font-medium">
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-blue-500"></div> Ventas</div>
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-rose-500"></div> Gastos</div>
                    <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-emerald-500"></div> Utilidad</div>
                  </div>
                </div>
                <div className="h-[350px] w-full">
                  {monthlyChart.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <AreaChart data={monthlyChart}>
                        <defs>
                          {[['Sales','#3B82F6'],['Expenses','#EF4444'],['Profit','#10B981']].map(([id,color]) => (
                            <linearGradient key={id} id={`color${id}`} x1="0" y1="0" x2="0" y2="1">
                              <stop offset="5%"  stopColor={color} stopOpacity={0.15}/>
                              <stop offset="95%" stopColor={color} stopOpacity={0}/>
                            </linearGradient>
                          ))}
                        </defs>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F0F0F0" />
                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize:11,fill:'#9CA3AF'}} dy={10} />
                        <YAxis axisLine={false} tickLine={false} tick={{fontSize:11,fill:'#9CA3AF'}} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`} />
                        <Tooltip contentStyle={{borderRadius:'16px',border:'none',boxShadow:'0 10px 15px -3px rgb(0 0 0 / 0.1)'}} formatter={v=>formatCurrency(v)} />
                        <Area type="monotone" dataKey="sales"    stroke="#3B82F6" strokeWidth={2.5} fillOpacity={1} fill="url(#colorSales)"    name="Ventas" />
                        <Area type="monotone" dataKey="expenses" stroke="#EF4444" strokeWidth={2.5} fillOpacity={1} fill="url(#colorExpenses)" name="Gastos" />
                        <Area type="monotone" dataKey="profit"   stroke="#10B981" strokeWidth={2.5} fillOpacity={1} fill="url(#colorProfit)"   name="Utilidad" />
                      </AreaChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="w-full h-full flex items-center justify-center text-gray-400">No hay datos para mostrar</div>
                  )}
                </div>
              </div>

              {/* CAMBIO 3: Todas las categorías con scroll */}
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                  <i className="fa-solid fa-chart-pie text-blue-600"></i> Distribución de Gastos
                </h2>
                <div className="h-[200px]">
                  {categoryBreakdown.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie data={categoryBreakdown.slice(0,9)} cx="50%" cy="50%" innerRadius={55} outerRadius={75} paddingAngle={4} dataKey="value">
                          {categoryBreakdown.map((_,i) => <Cell key={i} fill={COLORS[i%COLORS.length]} />)}
                        </Pie>
                        <Tooltip formatter={v=>formatCurrency(v)} />
                      </PieChart>
                    </ResponsiveContainer>
                  ) : (
                    <div className="w-full h-full flex items-center justify-center text-gray-400">Sin datos</div>
                  )}
                </div>
                {/* Lista completa scrollable */}
                <div className="mt-3 space-y-1.5 overflow-y-auto flex-1" style={{maxHeight:'220px'}}>
                  {categoryBreakdown.map((cat,i) => (
                    <div key={cat.name} className="flex items-center justify-between text-sm">
                      <div className="flex items-center gap-2 min-w-0">
                        <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{backgroundColor:COLORS[i%COLORS.length]}}></div>
                        <span className="text-gray-600 truncate">{cat.name}</span>
                      </div>
                      <span className="font-semibold text-xs ml-2 flex-shrink-0">{formatCurrency(cat.value)}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* CAMBIO 8: Utilidad mensual por barras */}
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
              <h2 className="text-lg font-bold mb-6 flex items-center gap-2">
                <i className="fa-solid fa-chart-bar text-blue-600"></i> Utilidad Neta por Mes
              </h2>
              <div className="h-[260px]">
                {monthlyChart.length > 0 ? (
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={monthlyChart} barSize={30}>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F0F0F0" />
                      <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize:11,fill:'#9CA3AF'}} dy={8} />
                      <YAxis axisLine={false} tickLine={false} tick={{fontSize:11,fill:'#9CA3AF'}} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`} />
                      <Tooltip contentStyle={{borderRadius:'16px',border:'none',boxShadow:'0 10px 15px -3px rgb(0 0 0 / 0.1)'}} formatter={v=>[formatCurrency(v),'Utilidad']} />
                      <Bar dataKey="profit" name="Utilidad" radius={[6,6,0,0]}>
                        {monthlyChart.map((entry,i) => (
                          <Cell key={i} fill={entry.profit >= 0 ? '#10B981' : '#EF4444'} />
                        ))}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                ) : (
                  <div className="w-full h-full flex items-center justify-center text-gray-400">No hay datos para mostrar</div>
                )}
              </div>
            </div>

            {/* CAMBIO 9: Negocios por mes */}
            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <h2 className="text-lg font-bold flex items-center gap-2">
                  <i className="fa-solid fa-briefcase text-blue-600"></i> Comparativa por Negocio y Mes
                </h2>
                <div className="flex items-center gap-2 flex-wrap no-print">
                  <span className="text-sm text-gray-400 mr-1">Filtrar mes:</span>
                  <button onClick={() => setSelectedBizMonth(null)}
                    className={cn("px-3 py-1 text-xs font-medium rounded-lg border transition-colors",
                      !selectedBizMonth ? "bg-blue-600 text-white border-blue-600" : "bg-white border-gray-200 text-gray-600 hover:bg-blue-50")}>
                    Todos
                  </button>
                  {[...new Set(businessByMonth.map(r=>r.month))].map(month => (
                    <button key={month} onClick={() => setSelectedBizMonth(month === selectedBizMonth ? null : month)}
                      className={cn("px-3 py-1 text-xs font-medium rounded-lg border transition-colors",
                        selectedBizMonth===month ? "bg-blue-600 text-white border-blue-600" : "bg-white border-gray-200 text-gray-600 hover:bg-blue-50")}>
                      {month}
                    </button>
                  ))}
                </div>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm">
                  <thead>
                    <tr className="text-xs uppercase tracking-wider text-gray-400 font-semibold">
                      <th className="pb-2 pr-6">Mes</th>
                      {allBusinesses.map(biz => (
                        <th key={biz} colSpan={3} className="pb-2 px-3 text-center border-l border-gray-100">{biz}</th>
                      ))}
                    </tr>
                    <tr className="text-xs text-gray-400 border-b border-gray-100">
                      <th className="pb-2 pr-6"></th>
                      {allBusinesses.map(biz => (
                        <React.Fragment key={biz}>
                          <th className="pb-2 px-2 text-emerald-600 border-l border-gray-100 font-medium">Ventas</th>
                          <th className="pb-2 px-2 text-rose-600 font-medium">Gastos</th>
                          <th className="pb-2 px-2 text-blue-600 font-medium">Utilidad</th>
                        </React.Fragment>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {bizMonthDisplay.map(row => (
                      <tr key={row.month} className="hover:bg-gray-50 transition-colors">
                        <td className="py-3 pr-6 font-semibold text-gray-700 whitespace-nowrap">{row.month}</td>
                        {allBusinesses.map(biz => {
                          const profit = row[`${biz}_profit`];
                          return (
                            <React.Fragment key={biz}>
                              <td className="py-3 px-2 text-emerald-600 font-medium whitespace-nowrap border-l border-gray-50">{formatCurrency(row[`${biz}_sales`])}</td>
                              <td className="py-3 px-2 text-rose-600 whitespace-nowrap">{formatCurrency(row[`${biz}_expenses`])}</td>
                              <td className="py-3 px-2 whitespace-nowrap">
                                <span className={cn("px-2 py-0.5 rounded-md text-xs font-bold",
                                  profit>=0 ? "bg-emerald-50 text-emerald-700" : "bg-rose-50 text-rose-700")}>
                                  {formatCurrency(profit)}
                                </span>
                              </td>
                            </React.Fragment>
                          );
                        })}
                      </tr>
                    ))}
                    {bizMonthDisplay.length === 0 && (
                      <tr><td colSpan={1+allBusinesses.length*3} className="py-6 text-center text-gray-400">Sin datos</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>

            {/* TABLA DE TRANSACCIONES */}
            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
              <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                <h2 className="text-lg font-bold">Transacciones ({filteredData.length})</h2>
                {/* CAMBIO 7: Botón exportar PDF - oculto en Ctrl+P */}
                <button onClick={() => exportToPDF(filteredData)}
                  className="no-print px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 flex items-center gap-2 transition-colors shadow-sm shadow-blue-200">
                  <i className="fa-solid fa-file-pdf"></i> Exportar PDF
                </button>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-left">
                  <thead className="bg-gray-50">
                    <tr className="text-xs uppercase tracking-wider text-gray-400 font-semibold">
                      <th className="px-6 py-4">Fecha</th>
                      <th className="px-6 py-4">Estado</th>
                      <th className="px-6 py-4">Transacción</th>
                      <th className="px-6 py-4">Negocio</th>
                      <th className="px-6 py-4">Proveedor</th>
                      <th className="px-6 py-4">Categoría</th>
                      <th className="px-6 py-4">Descripción</th>
                      <th className="px-6 py-4 text-right">Importe</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {paginatedData.map((t, i) => (
                      <tr key={i} className="hover:bg-gray-50 transition-colors">
                        <td className="px-6 py-3 text-sm text-gray-500 whitespace-nowrap">{t.FECHA}</td>
                        <td className="px-6 py-3 text-sm text-gray-600 whitespace-nowrap">{t.ESTADO_DE_RESULTADOS}</td>
                        <td className="px-6 py-3 text-sm text-gray-600 whitespace-nowrap">{t.TRANSACCION}</td>
                        <td className="px-6 py-3 text-sm font-medium whitespace-nowrap">{t.NEGOCIO}</td>
                        <td className="px-6 py-3 text-sm text-gray-500 whitespace-nowrap">{t.PROVEEDOR||'-'}</td>
                        <td className="px-6 py-3 whitespace-nowrap">
                          <span className="px-2 py-1 bg-gray-100 text-gray-600 rounded-md text-xs font-medium">{t.CATEGORIA}</span>
                        </td>
                        <td className="px-6 py-3 text-sm text-gray-500 max-w-xs truncate">{t.DESCRIPCION||'-'}</td>
                        <td className={cn("px-6 py-3 text-sm font-bold text-right whitespace-nowrap",
                          t.TRANSACCION==='Ingreso' ? "text-emerald-600" : "text-rose-600")}>
                          {t.TRANSACCION==='Ingreso' ? '+' : '-'}{formatCurrency(Number(t.IMPORTE))}
                        </td>
                      </tr>
                    ))}
                    {paginatedData.length === 0 && (
                      <tr><td colSpan="8" className="px-6 py-8 text-center text-gray-400">No se encontraron transacciones</td></tr>
                    )}
                  </tbody>
                  {/* CAMBIO 7: Totales al pie */}
                  <tfoot className="bg-gray-50 border-t-2 border-gray-200">
                    <tr>
                      <td colSpan="7" className="px-6 py-3 text-sm font-bold text-gray-700">
                        Totales ({filteredData.length} registros)
                      </td>
                      <td className="px-6 py-3 text-right">
                        <div className="text-emerald-600 font-bold text-sm">+{formatCurrency(totalIngresos)}</div>
                        <div className="text-rose-600 font-bold text-sm">-{formatCurrency(totalEgresos)}</div>
                        <div className={cn("font-bold text-sm border-t border-gray-300 mt-1 pt-1",
                          totalIngresos-totalEgresos>=0 ? "text-blue-600" : "text-rose-700")}>
                          {formatCurrency(totalIngresos-totalEgresos)}
                        </div>
                      </td>
                    </tr>
                  </tfoot>
                </table>
              </div>

              {totalPages > 1 && (
                <div className="p-4 border-t border-gray-100 flex items-center justify-between bg-gray-50 no-print">
                  <span className="text-sm text-gray-500">
                    Mostrando <span className="font-semibold text-gray-900">{(currentPage-1)*itemsPerPage+1}</span> a{' '}
                    <span className="font-semibold text-gray-900">{Math.min(currentPage*itemsPerPage,filteredData.length)}</span> de{' '}
                    <span className="font-semibold text-gray-900">{filteredData.length}</span>
                  </span>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1}
                      className="p-2 rounded-lg border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                      <i className="fa-solid fa-chevron-left"></i>
                    </button>
                    <span className="text-sm font-medium text-gray-700 px-2">Página {currentPage} de {totalPages}</span>
                    <button onClick={() => setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages}
                      className="p-2 rounded-lg border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                      <i className="fa-solid fa-chevron-right"></i>
                    </button>
                  </div>
                </div>
              )}
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
